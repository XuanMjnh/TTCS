name: plant_disease_ai
publish_to: 'none'
description: Ứng dụng nhận diện bệnh cây trồng đa cây bằng TensorFlow Lite và Firebase.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  tflite_flutter: ^0.11.0
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  image: ^4.2.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  intl: ^0.19.0
  crop_your_image: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/model.tflite
    - assets/models/labels.txt
    - assets/models/model_meta.json
    - assets/data/label_taxonomy.json
    - assets/data/advice_vi.json
    - assets/data/crop_info_vi.json
    - assets/data/farming_tips_vi.json
    - assets/data/model_config.json
    - assets/data/crop_catalog_vi.json
    - assets/images/crops/
